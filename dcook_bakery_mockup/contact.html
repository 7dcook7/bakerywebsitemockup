<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="assets/css/styles.css">

<body>
    
<header>
    <h1 id="cookiejar">Lakeside Bakery & Desserts</h1>
<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="menu.html">Menu</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>
   
</header>
<main>

<section>
        <div class="contact-container">
            <form class="contact-form"
            action="https://formspree.io/f/xovgkabp"
             method="POST">
                <div class="form-content">
                    <h2 id="contactheader">Contact us with any questions or comments by filling out the form below.</h2>
                    
                    <div class="form-group">
                        <label for="fname">Your first name:</label>
                        <input type="text" id="fname" name="firstname" required>
                    </div>

                    <div class="form-group">
                        <label for="lname">Your Last Name:</label>
                        <input type="text" id="fname" name="lastname" required>
                    </div>

                    <div class="form-group">
                        <label for="companyname">Company/Organization:</label>
                        <input type="text" id="fname" name="companyname">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Your Email Address:</label>
                        <input type="email" id="email" name="emailaddress" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Your Message:</label>
                        <textarea id="message" name="yourmessage" rows="5" required></textarea>
                    </div>
                    
                    <button type="submit">Send Message</button>
                </div>
            </form>
        </div>
    </section>

</main>

<footer>
<p>© 2026 Lakeside Bakery & Desserts</p>
</footer>
</body>
</html>
